name: Deploy to Production

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip Playwright tests'
        type: boolean
        default: false

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.skip_tests != 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PUBLIC_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    
    if: always() && (github.event.inputs.skip_tests == 'true' || needs.test.result == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to CoreServer
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup lftp
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set ftp:ssl-allow no; set ftp:passive-mode true; mirror -R --verbose dist/ /public_html/matchses/ ; bye" -u $FTP_USERNAME,$FTP_PASSWORD $FTP_HOST

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Check production URL
        run: |
          curl -sf ${{ vars.PUBLIC_URL }} > /dev/null && echo "[OK] Production is healthy" || { echo "[FAIL] Health check failed"; exit 1; }
